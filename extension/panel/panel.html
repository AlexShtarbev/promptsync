<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      font-size: 14.3px;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
    }
    .header {
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a2a;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 13px; font-weight: 600; }
    .status {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 999px;
    }
    .status.ok { background: rgba(34,197,94,0.15); color: #22c55e; }
    .status.err { background: rgba(239,68,68,0.15); color: #ef4444; }

    .controls {
      padding: 8px 12px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 6px;
      align-items: center;
      position: sticky;
      top: 39px;
      z-index: 10;
      background: #0f0f0f;
    }
    .controls select {
      flex: 1;
      background: #1a1a1a;
      color: #e5e5e5;
      border: 1px solid #2a2a2a;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .controls select:focus { outline: none; border-color: #8b5cf6; }

    .filter-row {
      padding: 4px 12px 8px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      position: sticky;
      top: 71px;
      z-index: 10;
      background: #0f0f0f;
    }
    .filter-btn {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #888;
      cursor: pointer;
    }
    .filter-btn:hover { border-color: #444; color: #bbb; }
    .filter-btn.active { border-color: #8b5cf6; color: #8b5cf6; background: rgba(139,92,246,0.1); }

    .shots { padding: 6px; }

    .shot-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      margin-bottom: 4px;
      overflow: hidden;
    }
    .shot-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      gap: 6px;
    }
    .shot-code {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      font-size: 12px;
      min-width: 28px;
    }
    .shot-meta {
      flex: 1;
      display: flex;
      gap: 4px;
      align-items: center;
      overflow: hidden;
    }
    .tag {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      background: #2a2a2a;
      color: #777;
      white-space: nowrap;
    }
    .tag.still { background: rgba(34,197,94,0.12); color: #22c55e; }
    .tag.kling { background: rgba(139,92,246,0.15); color: #8b5cf6; }
    .tag.googleflow { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .tag.kling-reuse { background: rgba(234,179,8,0.15); color: #eab308; }
    .tag.status-draft { color: #666; }
    .tag.status-mj-ready { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .tag.status-mj-done { background: rgba(34,197,94,0.12); color: #22c55e; }
    .tag.status-kling-ready { background: rgba(139,92,246,0.12); color: #8b5cf6; }
    .tag.status-kling-done { background: rgba(34,197,94,0.15); color: #22c55e; }
    .tag.status-complete { background: rgba(34,197,94,0.2); color: #22c55e; }

    .shot-actions {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }
    .btn-sm {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .btn-inject {
      background: #6d28d9;
      color: #fff;
    }
    .btn-inject:hover { background: #8b5cf6; }
    .btn-inject:disabled { opacity: 0.3; cursor: default; }
    .btn-copy {
      background: #2a2a2a;
      color: #ccc;
    }
    .btn-copy:hover { background: #333; }
    .btn-copy:disabled { opacity: 0.3; cursor: default; }

    .shot-preview {
      display: none;
      padding: 4px 8px 6px;
      border-top: 1px solid #222;
    }
    .shot-card.expanded .shot-preview { display: block; }
    .preview-text {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: #999;
      line-height: 1.4;
      max-height: 100px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .preview-label {
      font-size: 9px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }

    .empty {
      text-align: center;
      color: #555;
      padding: 40px 20px;
      font-size: 12px;
    }

    .shot-setting {
      font-size: 10px;
      color: #555;
      padding: 0 8px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-dl {
      background: #1e3a5f;
      color: #60a5fa;
    }
    .btn-dl:hover { background: #1e4a7f; }
    .btn-dl:disabled { opacity: 0.3; cursor: default; }
    .btn-dl:disabled:hover { background: #1e3a5f; }

    .btn-vid {
      background: #5f1e3a;
      color: #f472b6;
    }
    .btn-vid:hover { background: #7f1e4a; }
    .btn-vid:disabled { opacity: 0.3; cursor: default; }
    .btn-vid:disabled:hover { background: #5f1e3a; }

    .btn-sf {
      background: #3a3a1e;
      color: #facc15;
    }
    .btn-sf:hover { background: #4a4a1e; }

    .btn-upload-openart {
      background: #1e5f3a;
      color: #4ade80;
    }
    .btn-upload-openart:hover { background: #1e7f4a; }

    .btn-gen-rest {
      background: #1e3a5f;
      color: #60a5fa;
    }
    .btn-gen-rest:hover { background: #1e4a7f; }
    .btn-gen-rest:disabled { opacity: 0.6; cursor: default; }

    .btn-copy-desc {
      background: #2a2a2a;
      color: #ccc;
    }
    .btn-copy-desc:hover { background: #333; }

    .shot-card.has-image { border-left: 2px solid #22c55e; }

    .dl-bar {
      padding: 6px 12px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 6px;
      align-items: center;
      position: sticky;
      top: 71px;
      z-index: 10;
      background: #1a1a1a;
      font-size: 11px;
      color: #888;
    }
    .dl-bar .dl-shot {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      color: #8b5cf6;
    }
    .dl-bar .btn-dl-main {
      margin-left: auto;
      background: #6d28d9;
      color: #fff;
      border: none;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dl-bar .btn-dl-main:hover { background: #8b5cf6; }
    .dl-bar .btn-dl-main:disabled { opacity: 0.4; cursor: default; }

    .tooltip {
      position: fixed;
      max-width: 320px;
      padding: 8px 10px;
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      color: #ddd;
      font-size: 11px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .tooltip-label {
      font-size: 9px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
    }

    .btn-info {
      font-size: 11px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid #444;
      background: transparent;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
    }
    .btn-info:hover { border-color: #8b5cf6; color: #8b5cf6; }

    .shot-code { cursor: default; position: relative; }

    .shot-thumb-ext {
      width: 32px;
      height: 32px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid #333;
    }
    .shot-thumb-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px dashed #444;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: #555;
    }

    /* Tab bar */
    .tab-row {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 71px;
      z-index: 10;
      background: #0f0f0f;
    }
    .tab-btn {
      flex: 1;
      padding: 6px 0;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #888;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active { color: #8b5cf6; border-bottom-color: #8b5cf6; }

    /* Character cards */
    .char-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      margin-bottom: 4px;
      overflow: hidden;
    }
    .char-header {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      gap: 6px;
    }
    .char-name {
      font-weight: 700;
      font-size: 12px;
    }
    .char-type-tag {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      background: #2a2a2a;
      color: #777;
      text-transform: uppercase;
    }
    .char-status-tag {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      margin-left: auto;
    }
    .char-views-list {
      padding: 0 8px 6px;
    }
    .char-view-item {
      display: flex;
      align-items: center;
      padding: 4px 0;
      gap: 6px;
      border-top: 1px solid #222;
    }
    .char-view-name {
      font-size: 10px;
      color: #999;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .char-view-thumb {
      width: 28px;
      height: 28px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid #333;
    }
    .char-view-thumb-placeholder {
      width: 28px;
      height: 28px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px dashed #444;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      color: #555;
    }
    .char-view-item { flex-wrap: wrap; }
    .char-view-prompt {
      width: 100%;
      display: none;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: #999;
      line-height: 1.4;
      max-height: 100px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 4px 0;
    }
    .char-view-item.expanded .char-view-prompt { display: block; }

    .btn-del {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      font-size: 10px;
      width: 20px;
      height: 20px;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .btn-del:hover { background: rgba(239,68,68,0.3); }
    .btn-del:disabled { opacity: 0.3; cursor: default; }
    .btn-del svg { width: 12px; height: 12px; }

    @keyframes rainbow-pulse {
      0%   { color: #ef4444; text-shadow: 0 0 6px #ef444466; }
      16%  { color: #f97316; text-shadow: 0 0 6px #f9731666; }
      33%  { color: #eab308; text-shadow: 0 0 6px #eab30866; }
      50%  { color: #22c55e; text-shadow: 0 0 6px #22c55e66; }
      66%  { color: #3b82f6; text-shadow: 0 0 6px #3b82f666; }
      83%  { color: #8b5cf6; text-shadow: 0 0 6px #8b5cf666; }
      100% { color: #ef4444; text-shadow: 0 0 6px #ef444466; }
    }
    .char-name.gen-ready {
      animation: rainbow-pulse 2s linear infinite;
      cursor: pointer;
    }

    /* Generation "orbit": a blue light circling a thumbnail while its image is
       being generated. Wraps the thumb so it overlays a placeholder OR an existing
       image (re-generations show it too). Toggled via .generating on the wrapper. */
    .thumb-orbit-wrap {
      position: relative;
      display: inline-flex;
      flex-shrink: 0;
    }
    /* The beam's leading angle. An <angle> custom prop so the conic gradient can be
       animated smoothly (Chromium-only panel, so @property is safe). */
    @property --ps-orbit-angle {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }
    .thumb-orbit { display: none; }
    /* A bright head with a fading tail, sweeping around the thumbnail's edge — a
       beam of light tracing the border, not a rotating frame. Painted as a conic
       gradient (transparent most of the way, ramping up to a bright head) and
       masked down to a thin ring; animating the gradient's start angle sweeps it. */
    .thumb-orbit-wrap.generating .thumb-orbit {
      display: block;
      position: absolute;
      inset: -2px;
      border-radius: 5px;
      padding: 2px;
      pointer-events: none;
      background: conic-gradient(
        from var(--ps-orbit-angle),
        rgba(59, 130, 246, 0) 0deg,
        rgba(59, 130, 246, 0) 270deg,
        rgba(96, 165, 250, 0.7) 340deg,
        #dbeafe 360deg
      );
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter: drop-shadow(0 0 3px rgba(59, 130, 246, 0.85));
      animation: ps-orbit-sweep 1.1s linear infinite;
    }
    @keyframes ps-orbit-sweep { to { --ps-orbit-angle: 360deg; } }

    .action-row {
      padding: 6px 12px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .confirm-dialog {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      max-width: 280px;
      width: 90%;
    }
    .confirm-title {
      font-size: 13px;
      font-weight: 700;
      color: #ef4444;
      margin-bottom: 8px;
    }
    .confirm-msg {
      font-size: 11px;
      color: #999;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .btn-cancel {
      background: #2a2a2a;
      color: #ccc;
    }
    .btn-cancel:hover { background: #333; }
    .btn-confirm-danger {
      background: #ef4444;
      color: #fff;
    }
    .btn-confirm-danger:hover { background: #dc2626; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PromptSync</h1>
    <span id="status" class="status err">Offline</span>
  </div>

  <div class="controls">
    <select id="project-select" disabled>
      <option value="">Loading...</option>
    </select>
  </div>

  <div class="tab-row" id="tab-row" style="display:none">
    <button class="tab-btn active" data-tab="shots">Shots</button>
    <button class="tab-btn" data-tab="characters">Characters</button>
  </div>

  <div id="shots-panel">
    <div class="action-row" id="action-row" style="display:none">
      <button class="btn-sm btn-danger" id="clear-all-images-btn">Clear All Images</button>
    </div>
    <div class="filter-row" id="filter-row"></div>

    <div class="dl-bar" id="dl-bar" style="display:none">
      <span>&#8681;</span>
      <span>Save as</span>
      <span class="dl-shot" id="dl-shot-label">--</span>
      <button class="btn-dl-main" id="dl-btn" disabled>Download</button>
      <button class="btn-dl-main" id="batch-btn" style="background:#2a2a2a;margin-left:4px">Batch</button>
      <button class="btn-dl-main" id="autogen-btn" style="background:#1e3a5f;margin-left:4px">Auto Gen</button>
    </div>

    <div class="shots" id="shots"></div>
  </div>

  <div id="characters-panel" style="display:none">
    <div class="shots" id="characters"></div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay" style="display:none">
    <div class="confirm-dialog">
      <p class="confirm-title">Clear All Shot Images</p>
      <p class="confirm-msg">This will permanently delete all storyboard shot images. This cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn-sm btn-cancel" id="confirm-cancel">Cancel</button>
        <button class="btn-sm btn-confirm-danger" id="confirm-delete">Delete All</button>
      </div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
